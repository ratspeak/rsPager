[env:ratpager_915]
platform = espressif32@6.7.0
board = lilygo_t_pager
framework = arduino

board_build.flash_size = 16MB
board_build.f_flash = 80000000L
board_build.flash_mode = dio
board_build.partitions = partitions_16MB.csv
board_upload.flash_size = 16MB
board_build.arduino.memory_type = dio_qspi

build_flags =
    -std=gnu++17
    -fexceptions
    -O2
    -DRATPAGER=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; Silence vfs_api log_e noise — it fires on every open/remove of a missing
    ; file (normal for our atomic-save + tiered-read patterns). log_e routes to
    ; ets_printf, so esp_log_level_set doesn't help; only compile-time works.
    -DCORE_DEBUG_LEVEL=0
    -DRNS_USE_FS
    -DRNS_PERSIST_PATHS
    -DMSGPACK_USE_BOOST=OFF
    ; MsgPack's optional DebugLog path is included by microReticulum Link.cpp.
    ; Keep it error-only so dependency logging never defaults to TRACE.
    -DDEBUGLOG_DEFAULT_LOG_LEVEL_ERROR
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DRNS_DEFAULT_ALLOCATOR=RNS_PSRAM_ALLOCATOR
    -DRNS_CONTAINER_ALLOCATOR=RNS_PSRAM_POOL_ALLOCATOR
    -DRNS_PSRAM_POOL_BUFFER_SIZE=4194304
    ; microReticulum table caps — sized for client device, not transport node
    -DRNS_KNOWN_DESTINATIONS_MAX=256
    -DRNS_HASHLIST_MAX=256
    -DRNS_PATH_TABLE_MAX=256
    -DRNS_ANNOUNCE_TABLE_MAX=64
    -DRNS_RECEIPTS_MAX=32
    -DRNS_QUEUED_ANNOUNCES_MAX=16
    -DRNS_RANDOM_BLOBS_MAX=32
    -DRNS_RANDOM_BLOBS_PERSIST_MAX=16
    -DRNS_RATE_TIMESTAMPS_MAX=32
    -DRNS_PR_TAGS_MAX=128
    -DDISPLAY_WIDTH=480
    -DDISPLAY_HEIGHT=222
    -DLV_CONF_INCLUDE_SIMPLE
    "-I${PROJECT_DIR}"
    ; Task watchdog is already enabled by ESP-IDF defaults (5s timeout)

build_unflags =
    -fno-exceptions
    -std=gnu++11

lib_deps =
    https://github.com/ratspeak/microReticulum.git#83b88146f4a49bb46ea6e0c22c560257c33815d7
    bblanchon/ArduinoJson@^7.4.2
    lovyan03/LovyanGFX@~1.1.16
    lvgl/lvgl@~8.3.4

lib_archive = false

extra_scripts = post:merge_firmware.py

monitor_speed = 115200
upload_speed = 460800
upload_flags = --no-stub
